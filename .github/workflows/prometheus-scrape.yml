name: Scrape Prometheus Metrics

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  scrape-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Install Prometheus
        run: |
          wget -q https://github.com/prometheus/prometheus/releases/download/v2.51.0/prometheus-2.51.0.linux-amd64.tar.gz
          tar xf prometheus-2.51.0.linux-amd64.tar.gz
          sudo mv prometheus-2.51.0.linux-amd64/prometheus /usr/local/bin/
          sudo mv prometheus-2.51.0.linux-amd64/promtool /usr/local/bin/

      - name: Create Prometheus config
        run: |
          cat > prometheus.yml << EOF
          global:
            scrape_interval: 30s
            external_labels:
              application: redia-backend
              instance: redia-backend-2-c4bea5c8cfb5hvh7.brazilsouth-01.azurewebsites.net

          scrape_configs:
            - job_name: 'redia-backend'
              static_configs:
                - targets: ['redia-backend-2-c4bea5c8cfb5hvh7.brazilsouth-01.azurewebsites.net']
              scheme: https
              metrics_path: /actuator/prometheus

          remote_write:
            - url: ${{ secrets.GRAFANA_REMOTE_WRITE_URL }}
              basic_auth:
                username: '${{ secrets.GRAFANA_USERNAME }}'
                password: '${{ secrets.GRAFANA_TOKEN }}'
          EOF

      - name: Run Prometheus scrape and push
        run: |
          prometheus \
            --config.file=prometheus.yml \
            --storage.tsdb.path=/tmp/prometheus-data \
            --web.listen-address=":9091" &
          sleep 60
          kill %1 || true
