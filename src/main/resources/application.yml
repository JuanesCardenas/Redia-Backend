spring:
  application:
    name: restaurante-app
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

  # Configuración de seguridad para Basic Auth (Prometheus)
  security:
    user:
      name: ${PROM_USER:grafana_scraper}
      password: ${PROM_PASS:dummy_password_for_local}
      
server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  expiration: 900000
  refresh-expiration: 604800000

google:
  client-id: ${GOOGLE_CLIENT_ID}
  client-secret: ${GOOGLE_CLIENT_SECRET}

  recaptcha:
    enabled: true
    secret: ${RECAPTCHA_SECRET}
    url: https://www.google.com/recaptcha/api/siteverify

# Configuración de Prometheus y Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator

  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true

  health:
    db:
      enabled: false

  metrics:
    export:
      prometheus:
        enabled: true

  #Seguridad específica para endpoints de management
  security:
    enabled: true